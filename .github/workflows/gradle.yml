name: Build Plugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Patch Versioning (Fix Git Error)
      run: |
        sed -i 's/val gitVersion: String by lazy {/val gitVersion: String = "1.21.10" \/*/g' build.gradle.kts

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build -x test

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CustomNameplates-Fixed
        path: build/libs/*.jar
